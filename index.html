<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karim Tlm | Professional Voice Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-bg: #f4f7f6; --primary: #008080; --gold: #D4AF37; }
        body { background: var(--main-bg); font-family: 'Tajawal', sans-serif; margin: 0; padding: 20px; color: #333; }
        .studio-container { max-width: 500px; margin: auto; background: #fff; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { text-align: center; color: var(--primary); font-weight: bold; font-size: 22px; margin-bottom: 20px; }
        
        .upload-section { border: 2px dashed var(--primary); border-radius: 15px; padding: 20px; text-align: center; margin-bottom: 20px; background: #f9ffff; }
        .section-title { font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        
        textarea { width: 100%; border-radius: 12px; border: 1px solid #ddd; padding: 15px; font-family: 'Tajawal'; font-size: 16px; box-sizing: border-box; }
        
        .control-group { margin-top: 20px; }
        .slider-container { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        input[type="range"] { flex: 1; margin: 0 10px; accent-color: var(--primary); }

        .btn-generate { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-generate:hover { background: #006666; }
        
        .result-box { margin-top: 20px; background: #eaffea; border: 1px solid #2ecc71; border-radius: 12px; padding: 15px; display: none; }
        audio { width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="studio-container">
    <div class="header">🎙️ استنساخ الصوت - Karim Tlm</div>
    
    <div class="upload-section">
        <div class="section-title">📂 الملف المرجعي</div>
        <input type="file" id="audioFile" style="display:none" onchange="updateFileName()">
        <button onclick="document.getElementById('audioFile').click()" style="background:none; border: 1px solid var(--primary); padding: 8px 15px; border-radius: 8px; cursor: pointer;">رفع ملف صوتي 📤</button>
        <p id="fileName" style="font-size: 12px; color: #888; margin-top: 10px;">لا يوجد ملف مختار</p>
    </div>

    <div class="section-title">📝 النص المراد قراءته</div>
    <textarea id="txt" rows="4" placeholder="مرحبا بكم يا اصدقاء في عالمي الخاص..."></textarea>
    
    <div class="control-group">
        <div class="slider-container">
            <span>السرعة</span>
            <input type="range" min="0.5" max="2" step="0.1" value="1.2">
            <span id="speedVal">1.2x</span>
        </div>
        <div class="slider-container">
            <span>النبرة</span>
            <input type="range" min="0.5" max="1.5" step="0.1" value="1.1">
            <span id="pitchVal">1.1</span>
        </div>
    </div>

    <button class="btn-generate" onclick="generate()">توليد الصوت 🔊</button>

    <div class="result-box" id="res">
        <div style="color: #27ae60; font-weight: bold;">تم توليد الصوت بنجاح ✅</div>
        <audio id="player" controls></audio>
        <button style="margin-top:10px; width:100%; padding:10px; background: #eee; border:none; border-radius:8px; cursor:pointer;">تحميل الصوت 📥</button>
    </div>
</div>

<script>
    function updateFileName() {
        const file = document.getElementById('audioFile').files[0];
        document.getElementById('fileName').innerText = file ? file.name : "لا يوجد ملف مختار";
    }

    async function generate() {
        const resBox = document.getElementById('res');
        const btn = document.querySelector('.btn-generate');
        const text = document.getElementById('txt').value;
        const player = document.getElementById('player');

        if (!text) return alert("أدخل النص أولاً");

        btn.innerText = "جاري المعالجة... ⏳";
        btn.disabled = true;

        // الربط بالـ API الخاص بك
        try {
            const response = await fetch("https://api-inference.huggingface.co/models/facebook/mms-tts-ara", {
                headers: { Authorization: "Bearer Hf_FfsSfhvLpIfNpxRLImShHIznqLewqPqNkn" },
                method: "POST",
                body: JSON.stringify({ inputs: text }),
            });

            if (!response.ok) throw new Error();

            const blob = await response.blob();
            player.src = window.URL.createObjectURL(blob);
            resBox.style.display = "block";
            player.play();
        } catch (e) {
            alert("حدث خطأ في الاتصال بالسيرفر");
        } finally {
            btn.innerText = "توليد الصوت 🔊";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
