<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karim AI Musique</title>
    <style>
        /* التنسيق الذي يظهر في صورتك الأخيرة */
        :root {
            --bg-body: #f8f9f0;
            --primary-blue: #0d6efd;
            --accent-green: #00d282;
            --accent-orange: #ffc107;
        }
        body { background-color: var(--bg-body); font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; border-radius: 12px; width: 90%; max-width: 400px; border: 1px solid #dee2e6; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .header-bar { background: var(--primary-blue); height: 8px; }
        .content { padding: 20px; text-align: center; }
        .logo { font-size: 22px; font-weight: bold; margin-bottom: 5px; }
        .logo span { color: var(--accent-orange); }
        .input-group { background: #f1f3f5; border-radius: 8px; padding: 15px; margin-bottom: 15px; text-align: right; border: 1px solid #dee2e6; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        input, textarea { width: 100%; border: none; background: transparent; outline: none; font-size: 14px; }
        .btn { width: 100%; padding: 15px; border-radius: 8px; border: none; background: var(--accent-green); color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        #status { margin-top: 15px; font-size: 13px; }
        audio { width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-bar"></div>
    <div class="content">
        <div class="logo">KARIM<span>TREIZE13</span> AI</div>
        <p style="color: gray; font-size: 12px;">فرع استنساخ الأصوات الاحترافي 🎧</p>

        <div class="input-group">
            <label>ارفع عينة الصوت (صوتك الأصلي):</label>
            <input type="file" id="audioInput" accept="audio/*">
        </div>

        <div class="input-group">
            <label>اكتب النص المراد نطقُه بصوتك:</label>
            <textarea id="textInput" rows="3" placeholder="اكتب هنا..."></textarea>
        </div>

        <button class="btn" onclick="generateVoice()">توليد الصوت الآن ✨</button>
        <div id="status"></div>
    </div>
</div>

<script type="module">
    import { client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

    window.generateVoice = async function() {
        const text = document.getElementById('textInput').value;
        const audioFile = document.getElementById('audioInput').files[0];
        const status = document.getElementById('status');

        if (!text || !audioFile) {
            alert("ارفع ملف الصوت واكتب النص أولاً!");
            return;
        }

        status.innerHTML = "<span style='color: blue;'>⏳ جاري استنساخ الصوت.. يرجى الانتظار</span>";

        try {
            // الاتصال بالمحرك العالمي
            const app = await client("https://mrfakename-f5-tts.hf.space/");
            const result = await app.predict("/predict", [audioFile, text, "F5-TTS", false]);

            const audioUrl = result.data[0].url;
            status.innerHTML = `
                <p style="color: green;">✅ تم النسخ بنجاح!</p>
                <audio controls src="${audioUrl}"></audio>
                <br><a href="${audioUrl}" download style="color: blue; font-size: 12px;">تحميل الملف 📥</a>
            `;
        } catch (error) {
            status.innerHTML = "<span style='color: red;'>❌ السيرفر مشغول حالياً. جرب مرة أخرى بعد قليل.</span>";
        }
    }
</script>

</body>
</html>
