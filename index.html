<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحويل النص إلى صوت</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #333; font-size: 1.5rem; margin-bottom: 1.5rem; }
        textarea { width: 100%; height: 120px; padding: 12px; border: 2px solid #e0e0e0; border-radius: 12px; resize: none; font-size: 1rem; margin-bottom: 1rem; box-sizing: border-box; }
        button { background-color: #4a148c; color: white; border: none; padding: 12px 30px; border-radius: 10px; font-size: 1.1rem; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #6a1b9a; }
        #audioContainer { margin-top: 1.5rem; }
        audio { width: 100%; }
    </style>
</head>
<body>

<div class="card">
    <h1>تحويل النص إلى صوت</h1>
    <textarea id="userInput" placeholder="مرحبا بكم في عالمي الخاص..."></textarea>
    <button onclick="generateSpeech()">تحويل الآن</button>
    <div id="audioContainer"></div>
</div>

<script>
    async function generateSpeech() {
        const text = document.getElementById('userInput').value;
        const apiKey = "2b13c8a5466f467bbe7c4086352f268a"; // مفتاحك الجديد
        const voiceId = "pMsXg95S2nO50Z47XQpM"; // صوت Roger الاحترافي

        if (!text) { alert("من فضلك اكتب نصاً أولاً"); return; }

        try {
            const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
                method: 'POST',
                headers: { 'xi-api-key': apiKey, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    text: text,
                    model_id: "eleven_multilingual_v2",
                    voice_settings: { stability: 0.5, similarity_boost: 0.75 }
                })
            });

            if (response.ok) {
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                document.getElementById('audioContainer').innerHTML = `<audio controls autoplay src="${url}"></audio>`;
            } else {
                alert("حدث خطأ! تأكد من الرصيد أو مفتاح API.");
            }
        } catch (error) {
            alert("فشل الاتصال بالخدمة");
        }
    }
</script>

</body>
</html>
