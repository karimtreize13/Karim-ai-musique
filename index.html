<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARIMTREIZE13 AI - Free Version</title>
    <style>
        :root { --primary: #00d282; --dark: #1a1a1a; }
        body { background-color: #f0f2f5; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; border-radius: 20px; width: 90%; max-width: 400px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .logo { font-size: 26px; font-weight: bold; margin-bottom: 20px; }
        .logo span { color: #ffc107; }
        textarea { width: 100%; border: 1px solid #ddd; border-radius: 10px; padding: 15px; margin-bottom: 20px; resize: none; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; font-size: 18px; }
        #status { margin-top: 20px; font-weight: bold; color: #555; }
        .download-btn { display: none; margin-top: 15px; padding: 12px; background: var(--dark); color: white; text-decoration: none; border-radius: 10px; font-weight: bold; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">KARIM<span>TREIZE13</span> AI</div>
    <p style="color: #666; font-size: 14px; margin-bottom: 20px;">الإصدار المجاني المفتوح 🚀</p>
    
    <textarea id="textInput" rows="4" placeholder="اكتب النص هنا..."></textarea>
    
    <button class="btn" onclick="speakText()">تحويل النص إلى صوت ✨</button>
    
    <div id="status"></div>
    <div id="downloadContainer"></div>
</div>

<script>
    function speakText() {
        const text = document.getElementById('textInput').value;
        const status = document.getElementById('status');
        const container = document.getElementById('downloadContainer');

        if (!text) { alert("أدخل النص!"); return; }

        status.innerHTML = "⏳ جاري التجهيز...";

        // هذه الطريقة تستخدم محرك Google المجاني المدمج في المتصفحات
        const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=ar&client=tw-ob`;
        
        const audio = new Audio(url);
        audio.play();

        status.innerHTML = "✅ تم التحويل بنجاح!";
        
        // إضافة زر التحميل
        container.innerHTML = `
            <audio controls src="${url}" style="width:100%; margin-top:15px;"></audio>
            <br>
            <a href="${url}" target="_blank" class="download-btn" style="margin-top:10px; display:inline-block; background:#000; color:#fff; padding:10px; border-radius:8px; text-decoration:none;">فتح الرابط للتحميل 📥</a>
        `;
    }
</script>

</body>
</html>
