<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استوديو الصوت المجاني</title>
    <script src="https://code.responsivevoice.org/responsivevoice.js?key=8L7v6XzM"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); width: 90%; max-width: 400px; text-align: center; }
        h1 { color: #6c5ce7; font-size: 1.5rem; }
        textarea { width: 100%; height: 120px; padding: 12px; border: 2px solid #ddd; border-radius: 12px; font-size: 1rem; margin-bottom: 15px; box-sizing: border-box; }
        select { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ccc; margin-bottom: 20px; background: #f9f9f9; }
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        .play-btn { background: #6c5ce7; color: white; }
        .stop-btn { background: #ff7675; color: white; }
    </style>
</head>
<body>

<div class="card">
    <h1><i class="fas fa-volume-up"></i> محول الصوت المجاني</h1>
    <textarea id="textInput" placeholder="اكتب النص هنا..."></textarea>
    
    <select id="voiceSelect">
        <option value="Arabic Male">صوت رجل (عربي)</option>
        <option value="Arabic Female">صوت امرأة (عربية)</option>
    </select>

    <button class="play-btn" onclick="playVoice()">تشغيل الصوت</button>
    <button class="stop-btn" onclick="stopVoice()">إيقاف</button>
    
    <p style="font-size: 0.8rem; color: #888; margin-top: 15px;">إذا لم يعمل الصوت، تأكد من إلغاء وضع "الصامت" في هاتفك.</p>
</div>

<script>
    function playVoice() {
        const text = document.getElementById('textInput').value;
        const voice = document.getElementById('voiceSelect').value;

        if (text.trim() === "") {
            alert("يرجى كتابة نص!");
            return;
        }

        // فحص إذا كانت المكتبة محملة
        if (typeof responsiveVoice !== 'undefined') {
            responsiveVoice.speak(text, voice, {
                onstart: () => console.log("بدأ التشغيل"),
                onend: () => console.log("انتهى التشغيل")
            });
        } else {
            alert("جاري تحميل محرك الصوت.. حاول مرة أخرى بعد ثوانٍ");
        }
    }

    function stopVoice() {
        if (typeof responsiveVoice !== 'undefined') {
            responsiveVoice.cancel();
        }
    }
</script>

</body>
</html>
