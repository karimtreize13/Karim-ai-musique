<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARIMTREIZE13 AI - Pro Voice</title>
    <style>
        :root { --primary: #00d282; --dark: #1a1a1a; --yellow: #ffc107; }
        body { background-color: #f8f9fa; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; border-radius: 20px; width: 95%; max-width: 400px; padding: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; }
        .logo { font-size: 26px; font-weight: bold; margin-bottom: 20px; }
        .logo span { color: var(--yellow); }
        .box { background: #fdfdfd; border: 1px solid #eee; border-radius: 12px; padding: 15px; margin-bottom: 15px; text-align: right; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #555; font-size: 14px; }
        select, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 15px; outline: none; }
        
        /* شريط التحميل (السر الذي طلبته) */
        .loading-area { display: none; margin: 20px 0; }
        .dots { display: flex; justify-content: center; gap: 5px; }
        .dot { width: 10px; height: 10px; background: var(--primary); border-radius: 50%; animation: pulse 1.5s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }

        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; font-size: 18px; box-shadow: 0 4px 12px rgba(0,210,130,0.3); }
        .download-btn { display: none; margin-top: 15px; padding: 14px; background: var(--dark); color: white; text-decoration: none; border-radius: 10px; font-weight: bold; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">KARIM<span>TREIZE13</span> AI</div>
    
    <div class="box">
        <label>اختر الصوت البشري (Pro):</label>
        <select id="voiceId">
            <option value="pNInz6obpgDQGcFmaJgB">آدم (صوت فخم - للقصص)</option>
            <option value="EXAVITQu4vr4xnSDxMaL">سارة (صوت ناعم - للإعلانات)</option>
        </select>
    </div>

    <div class="box">
        <label>اكتب النص هنا:</label>
        <textarea id="textInput" rows="3" placeholder="اكتب النص الذي تريد تحميله..."></textarea>
    </div>

    <button id="genBtn" class="btn" onclick="generateVoice()">توليد وتحميل 🚀</button>

    <div id="loading" class="loading-area">
        <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <p style="font-size:12px; color:#777; margin-top:10px;">جاري التواصل مع السيرفر الاحترافي...</p>
    </div>

    <audio id="audioPlayer" controls style="width:100%; margin-top:20px; display:none;"></audio>
    <a id="downloadBtn" class="download-btn">تحميل الملف الصوتي (MP3) 📥</a>
</div>

<script>
    async function generateVoice() {
        const text = document.getElementById('textInput').value;
        const voice = document.getElementById('voiceId').value;
        const btn = document.getElementById('genBtn');
        const loading = document.getElementById('loading');
        const player = document.getElementById('audioPlayer');
        const download = document.getElementById('downloadBtn');

        // تنبيه: هذا المفتاح يحتاج رصيد حروف ليعمل
        const API_KEY = "Sk_128497b9e0588450f85daf1a0cb0c580990a229bc0c26562";

        if (!text) return alert("يرجى كتابة نص!");

        btn.style.display = "none";
        loading.style.display = "block";
        player.style.display = "none";
        download.style.display = "none";

        try {
            const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voice}`, {
                method: "POST",
                headers: { 
                    "xi-api-key": API_KEY, 
                    "Content-Type": "application/json",
                    "accept": "audio/mpeg"
                },
                body: JSON.stringify({ 
                    text: text, 
                    model_id: "eleven_multilingual_v2",
                    voice_settings: { stability: 0.5, similarity_boost: 0.8 }
                })
            });

            if (response.ok) {
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                
                loading.style.display = "none";
                btn.style.display = "block";
                
                player.src = url;
                player.style.display = "block";
                
                download.href = url;
                download.download = "Karim13_Voice.mp3";
                download.style.display = "block";
            } else {
                alert("انتهى رصيد الحساب المجاني! يرجى استخدام حساب جديد.");
                btn.style.display = "block";
                loading.style.display = "none";
            }
        } catch (e) {
            alert("حدث خطأ في الاتصال بالخدمة.");
            btn.style.display = "block";
            loading.style.display = "none";
        }
    }
</script>

</body>
</html>
