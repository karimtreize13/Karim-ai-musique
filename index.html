<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARIM 13 VOICE | PRO</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #334155; }
        h1 { color: #38bdf8; margin-bottom: 20px; }
        input, textarea, select { width: 100%; background: #0f172a; border: 1px solid #475569; color: white; padding: 12px; margin-bottom: 15px; border-radius: 10px; box-sizing: border-box; }
        button { background: #38bdf8; color: #0f172a; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        #status { margin-top: 15px; color: #94a3b8; }
        audio { width: 100%; margin-top: 20px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>KARIM 13 VOICE</h1>
    <input type="file" id="audioFile" accept="audio/*">
    <textarea id="textInput" placeholder="اكتب النص هنا..."></textarea>
    <select id="lang">
        <option value="ar">العربية</option>
        <option value="en">English</option>
        <option value="fr">Français</option>
    </select>
    <button id="go">استنساخ الصوت 🚀</button>
    <div id="status">جاهز...</div>
    <audio id="player" controls></audio>
</div>

<script>
    const btn = document.getElementById('go');
    const status = document.getElementById('status');
    const player = document.getElementById('player');

    // ملاحظة: تأكد أن هذا الرابط هو رابط الـ Space الخاص بك
    const API_URL = "https://karim-treize-13-xtts-voice-cloning.hf.space/run/predict"; 
    const TOKEN = "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";

    btn.onclick = async () => {
        const file = document.getElementById('audioFile').files[0];
        const text = document.getElementById('textInput').value;
        const lang = document.getElementById('lang').value;

        if(!file || !text) return alert("ارفع الملف واكتب النص!");

        btn.disabled = true;
        status.innerText = "⏳ جاري العمل... انتظر قليلاً";
        
        // تحويل الملف لقاعدة بيانات برمجية (Base64) لضمان وصوله للسيرفر
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async () => {
            const base64Audio = reader.result;

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${TOKEN}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        data: [text, lang, base64Audio, base64Audio, true] // ترتيب البيانات لـ XTTS
                    })
                });

                const result = await response.json();
                if (result.data) {
                    // Gradio يعيد رابطاً للملف الصوتي أو بيانات خام
                    const audioData = result.data[0].name ? `https://karim-treize-13-xtts-voice-cloning.hf.space/file=${result.data[0].name}` : result.data[0];
                    player.src = audioData;
                    player.style.display = "block";
                    status.innerText = "✅ نجح الاستنساخ!";
                } else {
                    throw new Error("السيرفر لم يرسل صوتاً.");
                }
            } catch (e) {
                status.innerText = "❌ خطأ في السيرفر.. تأكد أنه يعمل (Running)";
                console.error(e);
            } finally {
                btn.disabled = false;
            }
        };
    };
</script>

</body>
</html>
