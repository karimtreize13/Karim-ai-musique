
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محول النصوص إلى صوت - ElevenLabs</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background-color: #f4f4f9; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        textarea { width: 100%; height: 100px; margin-bottom: 20px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { background-color: #6a1b9a; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #4a148c; }
        audio { margin-top: 20px; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <h2>تحويل النص إلى صوت</h2>
    <textarea id="textInput" placeholder="اكتب النص الذي تريد تحويله هنا..."></textarea>
    <br>
    <button onclick="generateAudio()">تحويل الآن</button>
    
    <div id="audioPlayerContainer">
        </div>
</div>

<script>
    async function generateAudio() {
        const text = document.getElementById('textInput').value;
        const apiKey = "2b13c8a5466f467bbe7c4086352f268a"; // المفتاح الجديد الذي نسخته
        const voiceId = "pMsXg95S2nO50Z47XQpM"; // معرف صوت Roger الاحترافي (مجاني)

        if (!text) {
            alert("يرجى كتابة نص أولاً!");
            return;
        }

        const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
            method: 'POST',
            headers: {
                'xi-api-key': apiKey,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                text: text,
                model_id: "eleven_multilingual_v2",
                voice_settings: { stability: 0.5, similarity_boost: 0.75 }
            })
        });

        if (response.ok) {
            const blob = await response.blob();
            const url = URL.createObjectURL(blob);
            document.getElementById('audioPlayerContainer').innerHTML = `
                <audio controls autoplay>
                    <source src="${url}" type="audio/mpeg">
                </audio>
                <p style="margin-top:10px; color:green;">تم التوليد بنجاح! الرصيد متاح.</p>
            `;
        } else {
            alert("حدث خطأ! تأكد من الرصيد أو مفتاح API.");
        }
    }
</script>

</body>
</html>
