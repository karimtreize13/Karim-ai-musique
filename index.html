<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karim AI Musique</title>
    <style>
        :root { --bg-body: #f8f9f0; --primary-blue: #0d6efd; --accent-green: #00d282; --accent-orange: #ffc107; }
        body { background-color: var(--bg-body); font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; border-radius: 12px; width: 95%; max-width: 450px; border: 1px solid #dee2e6; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-bar { background: var(--primary-blue); height: 8px; }
        .content { padding: 25px; text-align: center; }
        .logo { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .logo span { color: var(--accent-orange); }
        .input-group { background: #f1f3f5; border-radius: 8px; padding: 15px; margin-bottom: 20px; text-align: right; border: 1px solid #dee2e6; }
        label { display: block; margin-bottom: 10px; font-weight: bold; font-size: 14px; }
        input[type="file"], textarea { width: 100%; border-radius: 5px; padding: 10px; box-sizing: border-box; border: 1px solid #ddd; }
        .btn { width: 100%; padding: 15px; border-radius: 8px; border: none; background: var(--accent-green); color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        #status { margin-top: 20px; font-size: 14px; }
        audio { width: 100%; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-bar"></div>
    <div class="content">
        <div class="logo">KARIM<span>TREIZE13</span> AI</div>
        <p style="color: gray; font-size: 13px; margin-bottom: 20px;">النسخة الاحترافية لاستنساخ الأصوات 🎤</p>
        <div class="input-group">
            <label>1. ارفع عينة صوتك:</label>
            <input type="file" id="audioInput" accept="audio/*">
        </div>
        <div class="input-group">
            <label>2. النص المراد نطقُه:</label>
            <textarea id="textInput" rows="3" placeholder="اكتب النص هنا..."></textarea>
        </div>
        <button class="btn" onclick="generateVoice()">توليد الصوت الآن ✨</button>
        <div id="status"></div>
    </div>
</div>

<script type="module">
    import { client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";
    window.generateVoice = async function() {
        const text = document.getElementById('textInput').value;
        const audioFile = document.getElementById('audioInput').files[0];
        const status = document.getElementById('status');
        if (!text || !audioFile) { alert("يرجى رفع ملف الصوت وكتابة النص!"); return; }
        status.innerHTML = "<span style='color: blue;'>⏳ جاري المعالجة...</span>";
        try {
            const app = await client("https://mrfakename-f5-tts.hf.space/", {
                hf_token: "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" 
            });
            const result = await app.predict("/predict", [audioFile, text, "F5-TTS", false]);
            const audioUrl = result.data[0].url;
            status.innerHTML = `<p style="color: green;">✅ تم بنجاح!</p><audio controls src="${audioUrl}"></audio>`;
        } catch (error) {
            status.innerHTML = "<span style='color: red;'>❌ السيرفر مشغول، حاول مرة أخرى.</span>";
        }
    }
</script>
</body>
</html>
