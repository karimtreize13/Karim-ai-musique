<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARIMTREIZE13 AI</title>
    <style>
        :root { --bg: #f4f7f6; --primary: #00d282; --dark: #1a1a1a; }
        body { background-color: var(--bg); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; border-radius: 20px; width: 90%; max-width: 400px; padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; border: 1px solid #eee; }
        .logo { font-size: 28px; font-weight: bold; margin-bottom: 5px; color: var(--dark); }
        .logo span { color: #ffc107; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 25px; }
        textarea { width: 100%; border: 2px solid #f0f0f0; border-radius: 12px; padding: 15px; margin-bottom: 20px; box-sizing: border-box; resize: none; font-size: 16px; outline: none; transition: 0.3s; }
        textarea:focus { border-color: var(--primary); }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,210,130,0.3); }
        .btn:hover { background: #00b972; transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }
        #status { margin-top: 20px; min-height: 40px; }
        audio { width: 100%; margin-top: 20px; border-radius: 10px; }
        .download-btn { display: none; margin-top: 15px; padding: 12px; background: var(--dark); color: white; text-decoration: none; border-radius: 10px; font-weight: bold; font-size: 15px; transition: 0.3s; }
        .download-btn:hover { background: #333; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">KARIM<span>TREIZE13</span> AI</div>
    <div class="subtitle">نظام تحويل النص إلى صوت احترافي 🚀</div>
    
    <textarea id="textInput" rows="4" placeholder="اكتب النص الذي تريد تحويله هنا..."></textarea>
    
    <button class="btn" onclick="generateVoice()">توليد الصوت ✨</button>
    
    <div id="status"></div>
    <audio id="audioPlayer" controls style="display:none;"></audio>
    <a id="downloadBtn" class="download-btn">تحميل الملف الصوتي 📥</a>
</div>

<script>
    async function generateVoice() {
        const text = document.getElementById('textInput').value;
        const status = document.getElementById('status');
        const audioPlayer = document.getElementById('audioPlayer');
        const downloadBtn = document.getElementById('downloadBtn');
        
        // المفتاح الجديد الخاص بك
        const API_KEY = "Sk_1dbc0777c2ae1a8120c1fdf4fece6144a7b731d72cb2f8e8"; 
        const VOICE_ID = "pNInz6obpgDQGcFmaJgB"; // صوت Adam (احترافي)

        if (!text) {
            alert("من فضلك اكتب النص أولاً!");
            return;
        }

        status.innerHTML = "<span style='color: #007bff; font-weight: bold;'>⏳ جاري المعالجة فوراً...</span>";
        audioPlayer.style.display = "none";
        downloadBtn.style.display = "none";

        try {
            const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}`, {
                method: 'POST',
                headers: {
                    'accept': 'audio/mpeg',
                    'xi-api-key': API_KEY,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    text: text,
                    model_id: "eleven_multilingual_v2",
                    voice_settings: { stability: 0.5, similarity_boost: 0.75 }
                })
            });

            if (response.ok) {
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                
                status.innerHTML = "<span style='color: #00d282; font-weight: bold;'>✅ تم التوليد بنجاح!</span>";
                
                // إظهار المشغل وزر التحميل
                audioPlayer.src = url;
                audioPlayer.style.display = "block";
                
                downloadBtn.href = url;
                downloadBtn.download = "Karim13_AI_Voice.mp3";
                downloadBtn.style.display = "inline-block";
            } else {
                const errorData = await response.json();
                status.innerHTML = "<span style='color: #ff4d4d;'>❌ حدث خطأ: " + (errorData.detail.message || "تأكد من الرصيد") + "</span>";
            }
        } catch (error) {
            status.innerHTML = "<span style='color: #ff4d4d;'>❌ فشل الاتصال بالسيرفر</span>";
        }
    }
</script>

</body>
</html>
