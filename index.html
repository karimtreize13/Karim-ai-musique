<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treize13 Voice Clone Pro</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .box { background: #1e293b; padding: 25px; border-radius: 20px; max-width: 500px; margin: auto; border: 1px solid #334155; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; background: #0f172a; color: white; }
        .btn { width: 100%; padding: 15px; background: #00d2ff; border: none; border-radius: 10px; color: black; font-weight: bold; cursor: pointer; }
        #status { margin: 15px 0; color: #fbbf24; font-size: 14px; }
        .result { display: none; margin-top: 20px; padding: 15px; background: #0f172a; border-radius: 10px; border: 1px dashed #00d2ff; }
        audio { width: 100%; }
        .dl-btn { display: inline-block; margin-top: 10px; color: #00d2ff; text-decoration: none; border: 1px solid #00d2ff; padding: 5px 15px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="box">
    <h2>مستنسخ الأصوات الاحترافي</h2>
    <input type="file" id="audioIn" accept="audio/*">
    <textarea id="textIn" placeholder="اكتب النص العربي هنا..."></textarea>
    <button class="btn" onclick="runClone()">توليد وتحميل الصوت ✅</button>
    
    <div id="status">جاهز للعمل.. ارفع صوتك واكتب نصك.</div>

    <div id="resBox" class="result">
        <p>استمع للنتيجة:</p>
        <audio id="player" controls></audio>
        <br>
        <a id="dlLink" class="dl-btn" href="#" download="my_voice.wav">تحميل MP3 الآن</a>
    </div>
</div>

<script>
    async function runClone() {
        const file = document.getElementById('audioIn').files[0];
        const text = document.getElementById('textIn').value;
        const status = document.getElementById('status');
        const resBox = document.getElementById('resBox');
        const player = document.getElementById('player');
        const dlLink = document.getElementById('dlLink');

        if(!file || !text) return alert("يرجى إكمال البيانات!");

        status.innerHTML = "⏳ جاري الاستنساخ.. قد يستغرق دقيقة، لا تغلق الصفحة!";
        resBox.style.display = "none";

        const formData = new FormData();
        formData.append("audio", file);
        formData.append("text", text);
        formData.append("language", "ar");

        try {
            // استخدام جسر API بديل ومستقر
            const response = await fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent("https://tts-api-clone.onrender.com/generate"), {
                method: "POST",
                body: formData
            });

            if (response.ok) {
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                player.src = url;
                dlLink.href = url;
                resBox.style.display = "block";
                status.innerHTML = "✅ اكتمل الاستنساخ! زر التحميل متاح الآن.";
            } else {
                throw new Error();
            }
        } catch (e) {
            status.innerHTML = "❌ السيرفر العالمي مزدحم. جرب الضغط مرة أخرى بعد 10 ثوانٍ.";
        }
    }
</script>
</body>
</html>
