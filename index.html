<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARIMTREIZE13 AI - Voice Cloning</title>
    <style>
        :root { --primary: #00d282; --dark: #1a1a1a; }
        body { background-color: #f4f7f6; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; border-radius: 20px; width: 90%; max-width: 450px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .logo { font-size: 26px; font-weight: bold; margin-bottom: 5px; }
        .logo span { color: #ffc107; }
        .box { background: #f9f9f9; border: 1px dashed #ccc; border-radius: 12px; padding: 15px; margin-bottom: 15px; text-align: right; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; }
        input[type="file"], textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 10px; }
        #status { margin-top: 15px; font-size: 14px; }
        audio { width: 100%; margin-top: 15px; }
        .download-btn { display: none; margin-top: 15px; padding: 12px; background: var(--dark); color: white; text-decoration: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">KARIM<span>TREIZE13</span> AI</div>
    <p style="color: #888; font-size: 12px; margin-bottom: 20px;">استنساخ الأصوات الاحترافي 🎙️</p>

    <div class="box">
        <label>1. ارفع عينة صوتك (MP3/WAV):</label>
        <input type="file" id="voiceFile" accept="audio/*">
    </div>

    <div class="box">
        <label>2. النص الذي سيقوله الصوت:</label>
        <textarea id="textInput" rows="3" placeholder="اكتب هنا..."></textarea>
    </div>

    <button class="btn" onclick="startCloning()">توليد الصوت المستنسخ ✨</button>

    <div id="status"></div>
    <audio id="audioPlayer" controls style="display:none;"></audio>
    <a id="downloadBtn" class="download-btn">تحميل الملف 📥</a>
</div>

<script>
    async function startCloning() {
        const fileInput = document.getElementById('voiceFile');
        const text = document.getElementById('textInput').value;
        const status = document.getElementById('status');
        const audioPlayer = document.getElementById('audioPlayer');
        const downloadBtn = document.getElementById('downloadBtn');

        const API_KEY = "Sk_1dbc0777c2ae1a8120c1fdf4fece6144a7b731d72cb2f8e8";

        if (!fileInput.files[0] || !text) {
            alert("يرجى رفع ملف صوتي وكتابة نص!");
            return;
        }

        status.innerHTML = "⏳ جاري استنساخ الصوت... قد يستغرق لحظات";
        
        try {
            // 1. إضافة الصوت لـ ElevenLabs (Instant Voice Cloning)
            const formData = new FormData();
            formData.append('name', 'TempVoice_' + Date.now());
            formData.append('files', fileInput.files[0]);

            const addVoiceRes = await fetch("https://api.elevenlabs.io/v1/voices/add", {
                method: "POST",
                headers: { "xi-api-key": API_KEY },
                body: formData
            });

            const voiceData = await addVoiceRes.json();
            const voiceId = voiceData.voice_id;

            // 2. تحويل النص باستخدام الصوت الجديد
            const ttsRes = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
                method: "POST",
                headers: { "xi-api-key": API_KEY, "Content-Type": "application/json" },
                body: JSON.stringify({ text: text, model_id: "eleven_multilingual_v2" })
            });

            if (ttsRes.ok) {
                const blob = await ttsRes.blob();
                const url = URL.createObjectURL(blob);
                status.innerHTML = "✅ تم الاستنساخ بنجاح!";
                audioPlayer.src = url;
                audioPlayer.style.display = "block";
                downloadBtn.href = url;
                downloadBtn.download = "Cloned_Voice_Karim13.mp3";
                downloadBtn.style.display = "inline-block";
            } else {
                status.innerHTML = "❌ خطأ في التوليد. تأكد من الرصيد.";
            }
        } catch (e) {
            status.innerHTML = "❌ فشل النظام. حاول مرة أخرى.";
        }
    }
</script>

</body>
</html>
