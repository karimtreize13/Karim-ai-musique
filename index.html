<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARIMTREIZE13 AI</title>
    <style>
        :root { --bg: #f8f9f0; --blue: #0d6efd; --green: #00d282; --orange: #ffc107; }
        body { background-color: var(--bg); font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; border-radius: 15px; width: 95%; max-width: 450px; padding: 25px; border: 1px solid #dee2e6; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .logo { font-size: 26px; font-weight: bold; margin-bottom: 20px; }
        .logo span { color: var(--orange); }
        .input-box { background: #f1f3f5; border-radius: 10px; padding: 15px; margin-bottom: 20px; text-align: right; }
        label { display: block; margin-bottom: 10px; font-weight: bold; color: #444; }
        textarea { width: 100%; border: 1px solid #ccc; border-radius: 6px; padding: 10px; box-sizing: border-box; resize: none; font-size: 16px; }
        .btn { width: 100%; padding: 16px; border-radius: 10px; border: none; background: var(--green); color: white; font-weight: bold; cursor: pointer; font-size: 18px; }
        #status { margin-top: 20px; font-size: 15px; min-height: 50px; }
        audio { width: 100%; margin-top: 15px; }
        .download-btn { display: inline-block; margin-top: 15px; padding: 12px 25px; background: #000; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">KARIM<span>TREIZE13</span> AI</div>
    <p style="color: #666; font-size: 13px; margin-bottom: 20px;">نظام توليد الأصوات الاحترافي 🚀</p>
    
    <div class="input-box">
        <label>اكتب النص هنا:</label>
        <textarea id="textInput" rows="4" placeholder="اكتب النص المراد تحويله..."></textarea>
    </div>

    <button class="btn" onclick="generateVoice()">تحويل النص إلى صوت ✨</button>
    <div id="status"></div>
</div>

<script>
    async function generateVoice() {
        const text = document.getElementById('textInput').value;
        const status = document.getElementById('status');
        
        // المفتاح الذي أرسلته (تأكد من عدم وجود مسافات عند النسخ)
        const API_KEY = "Sk_32ba0f0dcf81006748afaf395572ae6a3314cd82e5087931"; 
        const VOICE_ID = "pNInz6obpgDQGcFmaJgB"; 

        if (!text) { alert("يرجى كتابة نص!"); return; }

        status.innerHTML = "<span style='color: blue;'>⏳ جاري التحويل...</span>";

        try {
            const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}`, {
                method: 'POST',
                headers: {
                    'accept': 'audio/mpeg',
                    'xi-api-key': API_KEY,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    text: text,
                    model_id: "eleven_multilingual_v2",
                    voice_settings: { stability: 0.5, similarity_boost: 0.5 }
                })
            });

            if (response.ok) {
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                status.innerHTML = `
                    <p style="color: green; font-weight: bold;">✅ تم بنجاح!</p>
                    <audio controls autoplay src="${url}"></audio>
                    <br>
                    <a href="${url}" download="Karim13_AI_Voice.mp3" class="download-btn">تحميل الملف الصوتي 📥</a>
                `;
            } else {
                const err = await response.json();
                status.innerHTML = `<span style='color: red;'>❌ خطأ: ${err.detail.status === 'invalid_api_key' ? 'المفتاح غير صحيح' : 'انتهى الرصيد'}</span>`;
            }
        } catch (error) {
            status.innerHTML = "<span style='color: red;'>❌ فشل الاتصال.</span>";
        }
    }
</script>

</body>
</html>
