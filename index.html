<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARIMTREIZE13 AI</title>
    <style>
        :root { --primary: #00d282; --dark: #1a1a1a; --yellow: #ffc107; }
        body { background-color: #f8f9fa; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; border-radius: 20px; width: 90%; max-width: 450px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .logo { font-size: 26px; font-weight: bold; margin-bottom: 20px; }
        .logo span { color: var(--yellow); }
        .box { background: #fdfdfd; border: 1px solid #eee; border-radius: 12px; padding: 15px; margin-bottom: 15px; text-align: right; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #555; }
        select, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; font-size: 18px; box-shadow: 0 4px 10px rgba(0,210,130,0.3); }
        #status { margin-top: 15px; font-size: 14px; }
        audio { width: 100%; margin-top: 15px; display: none; }
        .download-btn { display: none; margin-top: 15px; padding: 12px; background: var(--dark); color: white; text-decoration: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">KARIM<span>TREIZE13</span> AI</div>
    
    <div class="box">
        <label>اختر الصوت (احترافي):</label>
        <select id="voiceSelect">
            <option value="pNInz6obpgDQGcFmaJgB">آدم (صوت عميق - ممتاز للعربية)</option>
            <option value="EXAVITQu4vr4xnSDxMaL">سارة (صوت ناعم - إعلاني)</option>
            <option value="VR6AweUjD35clNVIno7G">يوسف (صوت إخباري قوي)</option>
        </select>
    </div>

    <div class="box">
        <label>النص المراد تحويله:</label>
        <textarea id="textInput" rows="4" placeholder="اكتب النص هنا..."></textarea>
    </div>

    <button class="btn" onclick="generateVoice()">تحويل الآن 🚀</button>

    <div id="status"></div>
    <audio id="audioPlayer" controls></audio>
    <a id="downloadBtn" class="download-btn">تحميل الملف الصوتي 📥</a>
</div>

<script>
    async function generateVoice() {
        const voiceId = document.getElementById('voiceSelect').value;
        const text = document.getElementById('textInput').value;
        const status = document.getElementById('status');
        const audioPlayer = document.getElementById('audioPlayer');
        const downloadBtn = document.getElementById('downloadBtn');

        const API_KEY = "Sk_128497b9e0588450f85daf1a0cb0c580990a229bc0c26562";

        if (!text) { alert("أدخل النص أولاً!"); return; }

        status.innerHTML = "⏳ جاري التوليد السريع...";
        audioPlayer.style.display = "none";
        downloadBtn.style.display = "none";

        try {
            const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
                method: "POST",
                headers: { 
                    "xi-api-key": API_KEY, 
                    "Content-Type": "application/json" 
                },
                body: JSON.stringify({ 
                    text: text, 
                    model_id: "eleven_multilingual_v2",
                    voice_settings: { stability: 0.5, similarity_boost: 0.8 }
                })
            });

            if (response.ok) {
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                status.innerHTML = "<span style='color:green;'>✅ جاهز!</span>";
                audioPlayer.src = url;
                audioPlayer.style.display = "block";
                downloadBtn.href = url;
                downloadBtn.download = "Karim13_Voice.mp3";
                downloadBtn.style.display = "inline-block";
            } else {
                status.innerHTML = "<span style='color:red;'>❌ انتهى الرصيد المجاني لهذا الحساب.</span>";
            }
        } catch (e) {
            status.innerHTML = "<span style='color:red;'>❌ خطأ في الاتصال.</span>";
        }
    }
</script>

</body>
</html>
