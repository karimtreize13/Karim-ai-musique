<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karim Tlm | استنساخ الصوت</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2fe; --bg: #0b1120; }
        body { background-color: var(--bg); color: white; font-family: 'Cairo', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1a2235; border: 1px solid #2d3748; border-radius: 25px; padding: 40px; width: 90%; max-width: 450px; text-align: center; border-bottom: 6px solid var(--accent); }
        h1 { font-size: 2.5rem; margin: 0; background: linear-gradient(135deg, #00f2fe, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .field { text-align: right; margin-bottom: 20px; }
        label { color: var(--accent); font-weight: 700; }
        input, select, textarea { width: 100%; background: #0b1120; border: 1px solid #2d3748; color: white; padding: 12px; border-radius: 12px; margin-top: 8px; }
        .btn { background: linear-gradient(135deg, #00f2fe, #4facfe); color: #0b1120; border: none; padding: 18px; width: 100%; border-radius: 15px; font-size: 1.2rem; font-weight: 900; cursor: pointer; margin-top: 15px; }
        #status { margin-top: 20px; color: #4facfe; font-weight: bold; }
        .audio-box { margin-top: 25px; display: none; padding: 15px; border: 2px dashed var(--accent); border-radius: 20px; }
        audio { width: 100%; }
    </style>
</head>
<body>

<div class="card">
    <h1>KARIM TLM</h1>
    <p style="color: #a0aec0; font-size: 0.8rem;">ELITE AI VOICE SYSTEM</p>

    <div class="field">
        <label>🎙️ 1. ارفع عينة الصوت:</label>
        <input type="file" id="audioFile" accept="audio/*">
    </div>

    <div class="field">
        <label>📝 2. النص المراد نطقة:</label>
        <textarea id="textContent" rows="3" placeholder="أكتب هنا..."></textarea>
    </div>

    <div class="field">
        <label>🌐 3. اللغة:</label>
        <select id="lang">
            <option value="ar">العربية (Arabic)</option>
            <option value="en">English</option>
            <option value="fr">French</option>
        </select>
    </div>

    <button id="submitBtn" class="btn">توليد الصوت الآن 🚀</button>
    <div id="status">جاهز للاستخدام</div>

    <div class="audio-box" id="audioBox">
        <audio id="player" controls></audio>
    </div>
</div>

<script type="module">
    import { client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

    const btn = document.getElementById('submitBtn');
    const status = document.getElementById('status');
    const audioBox = document.getElementById('audioBox');

    // ضع مفتاحك الجديد هنا بدلاً من النجوم
    const HF_TOKEN = "Hf_DnWYMJaPIQjbhCXedLRmwqmMLeTgPNCRmT"; 

    btn.onclick = async () => {
        const file = document.getElementById('audioFile').files[0];
        const text = document.getElementById('textContent').value;
        const lang = document.getElementById('lang').value;

        if (!file || !text) return alert("أكمل البيانات!");

        btn.disabled = true;
        status.innerText = "⏳ جاري المعالجة... قد تستغرق دقيقة";

        try {
            const app = await client("karim-treize-13/xtts-voice-cloning", { hf_token: HF_TOKEN });
            const result = await app.predict("/predict", [text, lang, file, file, true]);

            document.getElementById('player').src = result.data[0].url;
            audioBox.style.display = "block";
            status.innerText = "✅ نجح الاستنساخ!";
        } catch (e) {
            status.innerText = "❌ السيرفر لا يستجيب، تأكد أنه Running في Hugging Face";
        } finally { btn.disabled = false; }
    };
</script>
</body>
</html>
