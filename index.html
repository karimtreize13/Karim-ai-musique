<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استوديو الأصوات المجاني</title>
    <script src="https://code.responsivevoice.org/responsivevoice.js?key=8L7v6XzM"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --main-color: #6c5ce7; --accent-color: #a29bfe; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 95%; max-width: 500px; text-align: center; border: 1px solid #e1e1e1; }
        h1 { color: var(--main-color); font-size: 1.8rem; margin-bottom: 20px; }
        textarea { width: 100%; height: 150px; padding: 15px; border: 2px solid #ddd; border-radius: 15px; font-size: 1rem; resize: none; box-sizing: border-box; transition: 0.3s; margin-bottom: 15px; }
        textarea:focus { border-color: var(--main-color); outline: none; }
        .voice-box { margin-bottom: 20px; text-align: right; }
        select { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #eee; font-size: 1rem; background: #fafafa; cursor: pointer; }
        .buttons { display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .play-btn { background: var(--main-color); color: white; }
        .play-btn:hover { background: #5b4bc4; transform: translateY(-2px); }
        .stop-btn { background: #ff7675; color: white; }
        .stop-btn:hover { background: #d63031; }
        .footer { margin-top: 20px; font-size: 0.85rem; color: #888; }
        .badge { background: #e8f0fe; color: #1a73e8; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 0.75rem; }
    </style>
</head>
<body>

<div class="card">
    <span class="badge">إصدار مجاني غير محدود</span>
    <h1><i class="fas fa-microphone-alt"></i> محول النصوص الاحترافي</h1>
    
    <textarea id="textInput" placeholder="اكتب النص العربي هنا ليتم تحويله لصوت بشري..."></textarea>
    
    <div class="voice-box">
        <label style="font-weight: bold; color: #555; display: block; margin-bottom: 8px;">اختر الصوت:</label>
        <select id="voiceSelect">
            <option value="Arabic Male">صوت رجل عربي</option>
            <option value="Arabic Female">صوت امرأة عربية</option>
            <option value="Saudi Arabia Male">لهجة سعودية (رجل)</option>
        </select>
    </div>

    <div class="buttons">
        <button class="play-btn" onclick="startSpeech()">
            <i class="fas fa-play"></i> تشغيل
        </button>
        <button class="stop-btn" onclick="stopSpeech()">
            <i class="fas fa-stop"></i> إيقاف
        </button>
    </div>

    <div class="footer">
        <p>يعمل بنظام ResponsiveVoice الذكي <br> لا يحتاج بطاقة بنكية ولا رصيد</p>
    </div>
</div>

<script>
    function startSpeech() {
        const text = document.getElementById('textInput').value;
        const selectedVoice = document.getElementById('voiceSelect').value;

        if (text.trim() === "") {
            alert("يرجى كتابة نص أولاً!");
            return;
        }

        // إعدادات الصوت: السرعة (rate)، النبرة (pitch)، والحجم (volume)
        responsiveVoice.speak(text, selectedVoice, {
            pitch: 1,
            rate: 1,
            volume: 1
        });
    }

    function stopSpeech() {
        responsiveVoice.cancel();
    }
</script>

</body>
</html>
