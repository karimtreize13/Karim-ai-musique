<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Treize13 - MiniMax Voice Interface</title>
    <style>
        body { font-family: sans-serif; background: #0b0f19; color: white; text-align: center; padding: 50px; }
        .container { background: #161b22; padding: 30px; border-radius: 15px; max-width: 500px; margin: auto; border: 1px solid #30363d; }
        textarea { width: 100%; height: 120px; background: #0d1117; color: white; border: 1px solid #30363d; padding: 10px; border-radius: 8px; margin: 20px 0; }
        .btn { background: #238636; color: white; padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        #loader { display: none; margin-top: 15px; color: #8b949e; }
        audio { width: 100%; margin-top: 20px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>واجهة استنساخ الصوت (MiniMax)</h2>
    <p>سيتم توليد الصوت بنبرة Clyde الاحترافية</p>
    
    <textarea id="inputText" placeholder="اكتب النص هنا للتحويل لصوت..."></textarea>
    
    <button class="btn" onclick="generateAudio()">توليد الصوت عبر MiniMax</button>
    
    <div id="loader">⏳ جاري الاتصال بحسابك في MiniMax...</div>
    
    <audio id="audioResult" controls></audio>
</div>

<script>
    async function generateAudio() {
        const text = document.getElementById('inputText').value;
        const loader = document.getElementById('loader');
        const audio = document.getElementById('audioResult');

        if (!text) return alert("يرجى كتابة نص!");

        loader.style.display = "block";
        audio.style.display = "none";

        try {
            // ملاحظة: يجب وضع الـ API Key الخاص بك هنا ليعمل الربط
            const response = await fetch("https://api.minimax.chat/v1/text_to_speech", {
                method: "POST",
                headers: {
                    "Authorization": "Bearer YOUR_MINIMAX_API_KEY", // ضع مفتاحك هنا
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    "voice_id": "clyde_pro_13", // معرف صوت Clyde
                    "text": text,
                    "model": "speech-01"
                })
            });

            const result = await response.json();
            if (result.audio_url) {
                audio.src = result.audio_url;
                audio.style.display = "block";
                loader.style.display = "none";
            }
        } catch (error) {
            alert("حدث خطأ في الربط، تأكد من مفتاح الـ API");
            loader.style.display = "none";
        }
    }
</script>
</body>
</html>
