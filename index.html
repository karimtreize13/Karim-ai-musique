<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karim 13 Voice | AI Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main-blue: #00d2ff; --dark-bg: #0f172a; --glass: rgba(30, 41, 59, 0.7); }
        body { background: radial-gradient(circle at top, #1e293b, #0f172a); color: white; font-family: 'Cairo', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow-x: hidden; }
        .container { background: var(--glass); backdrop-filter: blur(10px); padding: 40px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); width: 100%; max-width: 450px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        h1 { font-size: 2.2rem; background: linear-gradient(to right, #00d2ff, #3a7bd5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; font-weight: 700; }
        .subtitle { color: #94a3b8; margin-bottom: 30px; font-size: 0.9rem; }
        .input-card { background: rgba(15, 23, 42, 0.5); padding: 20px; border-radius: 16px; margin-bottom: 20px; text-align: right; border: 1px solid rgba(255,255,255,0.05); }
        label { display: block; margin-bottom: 10px; color: var(--main-blue); font-weight: bold; font-size: 0.85rem; }
        input, select, textarea { width: 100%; background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 12px; font-family: 'Cairo'; font-size: 1rem; transition: 0.3s; }
        input:focus { border-color: var(--main-blue); box-shadow: 0 0 10px rgba(0, 210, 255, 0.2); }
        .btn-glow { background: linear-gradient(45deg, #00d2ff, #3a7bd5); color: white; border: none; padding: 18px; width: 100%; border-radius: 16px; font-size: 1.2rem; font-weight: 700; cursor: pointer; transition: 0.4s; box-shadow: 0 10px 20px -5px rgba(0, 210, 255, 0.4); }
        .btn-glow:hover { transform: translateY(-3px); box-shadow: 0 15px 30px -5px rgba(0, 210, 255, 0.6); }
        .btn-glow:disabled { background: #334155; transform: none; box-shadow: none; cursor: not-allowed; }
        #status { margin-top: 20px; color: #38bdf8; font-weight: bold; min-height: 24px; }
        audio { width: 100%; margin-top: 25px; border-radius: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>KARIM 13 VOICE</h1>
    <div class="subtitle">نظام الذكاء الاصطناعي لاستنساخ الأصوات</div>

    <div class="input-card">
        <label>🎙️ ارفع عينة الصوت (Reference):</label>
        <input type="file" id="audio_ref" accept="audio/*">
    </div>

    <div class="input-card">
        <label>📝 النص المراد توليده:</label>
        <textarea id="text_to_gen" rows="3" placeholder="اكتب ما تريد قوله هنا..."></textarea>
    </div>

    <div class="input-card">
        <label>🌍 لغة النطق:</label>
        <select id="lang_select">
            <option value="ar">العربية (Arabic)</option>
            <option value="en">الإنجليزية (English)</option>
            <option value="fr">الفرنسية (French)</option>
            <option value="tr">التركية (Turkish)</option>
        </select>
    </div>

    <button id="magic_btn" class="btn-glow">توليد الصوت السحري ✨</button>
    
    <div id="status">جاهز للانطلاق...</div>
    <audio id="audio_out" controls></audio>
</div>

<script>
    const API_URL = "https://karim-treize-13-xtts-voice-cloning.hf.space/run/predict";
    const TOKEN = "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";

    const btn = document.getElementById('magic_btn');
    const status = document.getElementById('status');
    const player = document.getElementById('audio_out');

    btn.onclick = async () => {
        const file = document.getElementById('audio_ref').files[0];
        const text = document.getElementById('text_to_gen').value;
        const lang = document.getElementById('lang_select').value;

        if(!file || !text) return alert("يرجى تعبئة كافة الحقول!");

        btn.disabled = true;
        status.innerText = "⏳ جاري استنساخ الصوت (قد يستغرق 30 ثانية)...";
        player.style.display = "none";

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async () => {
            const base64Audio = reader.result;

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        data: [text, lang, base64Audio, base64Audio, true]
                    })
                });

                const json = await response.json();
                if (json.data && json.data[0]) {
                    // تصحيح مسار الملف الصوتي الناتج
                    const fileName = json.data[0].name;
                    player.src = `https://karim-treize-13-xtts-voice-cloning.hf.space/file=${fileName}`;
                    player.style.display = "block";
                    status.innerText = "✅ نجح الاستنساخ! استمتع بصوتك.";
                } else {
                    throw new Error("السيرفر لم يرسل ملفاً.");
                }
            } catch (err) {
                status.innerText = "❌ خطأ في السيرفر. تأكد أن Hugging Face أخضر (Running).";
                console.error(err);
            } finally {
                btn.disabled = false;
            }
        };
    };
</script>
</body>
</html>
