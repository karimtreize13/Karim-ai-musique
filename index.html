<script type="module">
    // استيراد المكتبة التي ستتحدث مع محرك الصوت
    import { client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

    window.generateVoice = async function() {
        const text = document.getElementById('textInput').value;
        const audioFile = document.getElementById('audioInput').files[0];
        const status = document.getElementById('status');

        if (!text || !audioFile) {
            alert("يا بطل، ارفع ملف صوت واكتب النص أولاً!");
            return;
        }

        status.innerText = "⏳ جاري استنساخ الصوت.. انتظر قليلاً";
        status.style.color = "#0d6efd";

        try {
            // الاتصال بمحرك F5-TTS (المحرك الذي استخلصناه من المبرمج)
            const app = await client("https://mrfakename-f5-tts.hf.space/");
            const result = await app.predict("/predict", [
                audioFile, 	// ملف الصوت الخاص بك
                text, 		// النص الذي كتبته
                "F5-TTS", 	// الموديل المستخدم
                false, 		// خيار إزالة الضجيج
            ]);

            // استلام ملف الصوت الناتج
            const audioUrl = result.data[0].url;
            
            // إنشاء مشغل صوتي للنتيجة
            status.innerHTML = `
                <p style="color: #28a745;">✅ تم النسخ بنجاح!</p>
                <audio controls src="${audioUrl}" style="width: 100%; margin-top: 10px;"></audio>
                <br>
                <a href="${audioUrl}" download="karim_voice.wav" style="color: blue; text-decoration: underline;">تحميل الملف الصوتي</a>
            `;
        } catch (error) {
            console.error(error);
            status.innerText = "❌ نفدت نقاط المحرك المجانية حالياً. جرب غداً أو استخدم حساباً آخر.";
            status.style.color = "red";
        }
    }
</script>
