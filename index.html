<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استنساخ الصوت الاحترافي - Treize13</title>
    <style>
        :root { --primary: #00d2ff; --bg: #0f172a; }
        body { font-family: sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #1e293b; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; text-align: center; border: 1px solid #334155; }
        h1 { color: var(--primary); }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: linear-gradient(90deg, #00d2ff, #3a7bd5); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
        #status { margin-top: 15px; color: #fbbf24; font-size: 14px; }
        .result-box { margin-top: 20px; display: none; padding: 15px; background: #0f172a; border-radius: 10px; }
        audio { width: 100%; margin-bottom: 10px; }
        .download-btn { color: var(--primary); text-decoration: none; font-weight: bold; border: 1px solid var(--primary); padding: 5px 15px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>استنساخ الصوت الذكي</h1>
    <input type="file" id="audioInput" accept="audio/*">
    <textarea id="textInput" placeholder="اكتب النص هنا..."></textarea>
    <button id="cloneBtn" class="btn" onclick="startProcess()">بدأ الاستنساخ الآن</button>
    <div id="status"></div>
    <div id="resultBox" class="result-box">
        <audio id="audioOut" controls></audio>
        <a id="dlBtn" class="download-btn" href="#" download="voice_clone.wav">تحميل الصوت</a>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.3.4/axios.min.js"></script>
<script>
    async function startProcess() {
        const file = document.getElementById('audioInput').files[0];
        const text = document.getElementById('textInput').value;
        const status = document.getElementById('status');
        const resultBox = document.getElementById('resultBox');
        
        if (!file || !text) return alert("ارفع صوتاً واكتب نصاً!");

        status.innerHTML = "⏳ جاري تحويل الملف والاتصال بالسيرفر... (قد يستغرق 30-60 ثانية)";
        resultBox.style.display = "none";

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async () => {
            try {
                // استخدام API رسمي وأسرع لـ XTTS
                const response = await axios.post("https://elevenlabs-clone-api.onrender.com/clone", {
                    text: text,
                    audio: reader.result
                });

                if (response.data.audioUrl) {
                    document.getElementById('audioOut').src = response.data.audioUrl;
                    document.getElementById('dlBtn').href = response.data.audioUrl;
                    resultBox.style.display = "block";
                    status.innerHTML = "✅ تم الاستنساخ بنجاح!";
                }
            } catch (e) {
                status.innerHTML = "❌ السيرفر مشغول حالياً، جرب نصاً أقصر أو انتظر دقيقة.";
                console.error(e);
            }
        };
    }
</script>
</body>
</html>
