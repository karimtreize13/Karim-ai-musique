<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Treize13 - محاكي صوت Clyde</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; text-align: center; padding: 40px; }
        .card { background: #1e293b; border-radius: 20px; padding: 30px; max-width: 500px; margin: auto; border: 1px solid #334155; }
        textarea { width: 100%; height: 100px; margin: 20px 0; border-radius: 10px; padding: 10px; background: #0f172a; color: white; border: 1px solid #334155; }
        .btn { background: #00d2ff; color: black; padding: 15px 30px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }
        #status { margin-top: 20px; color: #fbbf24; }
        .audio-result { margin-top: 30px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>نسخ نبرة صوت Clyde 🎙️</h2>
    <p>اكتب النص وسأقوم بتوليده بنفس نبرة الملف الذي أرسلته</p>
    
    <textarea id="myText" placeholder="اكتب النص العربي هنا..."></textarea>
    
    <button class="btn" onclick="cloneThisVoice()">توليد الصوت الآن</button>
    
    <div id="status"></div>
    
    <div id="result" class="audio-result">
        <audio id="player" controls></audio>
        <br><br>
        <a id="download" style="color: #00d2ff; text-decoration: none; font-weight: bold;" href="#" download="clyde_clone.mp3">⬇️ تحميل الملف MP3</a>
    </div>
</div>

<script>
    async function cloneThisVoice() {
        const text = document.getElementById('myText').value;
        const status = document.getElementById('status');
        const result = document.getElementById('result');
        const player = document.getElementById('player');
        const download = document.getElementById('download');

        if (!text) return alert("اكتب نصاً أولاً!");

        status.innerText = "⏳ جاري محاكاة النبرة وتوليد الصوت...";
        result.style.display = "none";

        try {
            // هذا الرابط يربط مباشرة بمحرك XTTS-v2 مع بصمة Clyde
            const response = await fetch("https://coqui-xtts.hf.space/run/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    data: [
                        text,
                        "ar", // اللغة العربية
                        "https://huggingface.co/datasets/pbevan/test-audio/resolve/main/clyde.mp3", // رابط البصمة الصوتية لـ Clyde
                        null,
                        false
                    ]
                })
            });

            const data = await response.json();
            if (data.data && data.data[0]) {
                const audioUrl = data.data[0].name;
                player.src = audioUrl;
                download.href = audioUrl;
                result.style.display = "block";
                status.innerText = "✅ تم النسخ بنجاح!";
            }
        } catch (e) {
            status.innerText = "❌ السيرفر مشغول، حاول مرة أخرى بعد قليل.";
        }
    }
</script>

</body>
</html>
