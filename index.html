<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karim Voice Clone | استنساخ الصوت الاحترافي</title>
    <style>
        body { background: #0f172a; color: white; font-family: 'Cairo', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); width: 90%; max-width: 450px; text-align: center; border: 1px solid #334155; }
        h1 { color: #38bdf8; font-size: 1.8rem; margin-bottom: 10px; }
        p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 25px; }
        .input-group { background: #334155; padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: right; }
        label { display: block; margin-bottom: 8px; color: #38bdf8; font-weight: bold; }
        input, select, textarea { width: 100%; background: #1e293b; border: 1px solid #475569; color: white; padding: 10px; border-radius: 8px; outline: none; }
        button { background: linear-gradient(90deg, #38bdf8, #818cf8); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s; }
        button:hover { transform: scale(1.02); filter: brightness(1.1); }
        audio { width: 100%; margin-top: 20px; filter: invert(100%); display: none; }
        .footer { margin-top: 20px; font-size: 0.8rem; color: #64748b; }
    </style>
</head>
<body>

<div class="container">
    <h1>KARIM 13 VOICE</h1>
    <p>نظام استنساخ الصوت الذكي بـ 17 لغة</p>

    <div class="input-group">
        <label>🎤 1. عينة صوتك (Speaker):</label>
        <input type="file" id="speaker_file" accept="audio/*">
    </div>

    <div class="input-group">
        <label>✍️ 2. النص المراد نطقه:</label>
        <textarea id="input_text" rows="3" placeholder="اكتب النص هنا..."></textarea>
    </div>

    <div class="input-group">
        <label>🌐 3. اللغة:</label>
        <select id="lang">
            <option value="ar">العربية</option>
            <option value="en">English</option>
            <option value="fr">Français</option>
        </select>
    </div>

    <button id="startBtn">بدء استنساخ الصوت الآن</button>
    
    <p id="msg" style="margin-top: 15px;"></p>
    <audio id="player" controls></audio>

    <div class="footer">تطوير كريم 13 - مدعوم بـ XTTS-v2</div>
</div>

<script>
    const API_URL = "https://karim-treize-13-xtts-voice-cloning.hf.space/clone";
    const TOKEN = "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";

    const btn = document.getElementById('startBtn');
    const msg = document.getElementById('msg');
    const player = document.getElementById('player');

    btn.onclick = async () => {
        const file = document.getElementById('speaker_file').files[0];
        const text = document.getElementById('input_text').value;
        const lang = document.getElementById('lang').value;

        if(!file || !text) return alert("من فضلك ارفع الصوت واكتب النص!");

        btn.disabled = true;
        msg.innerText = "⏳ جاري المعالجة (انتظر دقيقة)...";
        player.style.display = "none";

        const fd = new FormData();
        fd.append('speaker_wav', file);
        fd.append('text', text);
        fd.append('language', lang);

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: {'Authorization': `Bearer ${TOKEN}`},
                body: fd
            });
            const blob = await res.blob();
            player.src = URL.createObjectURL(blob);
            player.style.display = "block";
            msg.innerText = "✅ جاهز للاستماع!";
        } catch (e) {
            msg.innerText = "❌ تأكد أن سيرفر Hugging Face أخضر (Running)";
        } finally {
            btn.disabled = false;
        }
    };
</script>

</body>
</html>
