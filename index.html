<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARIMTREIZE13 AI</title>
    <style>
        :root { --primary: #00d282; --yellow: #ffc107; }
        body { background-color: #f8f9fa; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; border-radius: 20px; width: 90%; max-width: 400px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .logo { font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        .logo span { color: var(--yellow); }
        .box { background: #fdfdfd; border: 1px solid #eee; border-radius: 12px; padding: 15px; margin-bottom: 15px; text-align: right; }
        textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; outline: none; resize: none; text-align: center; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; font-size: 18px; }
        
        /* النقاط المتحركة */
        .loading { display: none; margin: 20px 0; }
        .dots { display: flex; justify-content: center; gap: 5px; }
        .dot { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; animation: pulse 1s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">KARIM<span>TREIZE13</span> AI</div>
    <div class="box">
        <textarea id="textInput" rows="4" placeholder="اكتب النص هنا..."></textarea>
    </div>

    <button id="genBtn" class="btn" onclick="speak()">توليد الصوت ✨</button>

    <div id="loading" class="loading">
        <div class="dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <p style="font-size: 12px; color: #888; margin-top: 10px;">جاري تشغيل الصوت الآن...</p>
    </div>
</div>

<script>
    function speak() {
        const text = document.getElementById('textInput').value;
        const btn = document.getElementById('genBtn');
        const loading = document.getElementById('loading');

        if (!text) return alert("يرجى كتابة نص!");

        // إخفاء الزر وإظهار التحميل
        btn.style.display = "none";
        loading.style.display = "block";

        // إيقاف أي صوت شغال حالياً
        window.speechSynthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ar-SA'; // تحديد اللغة العربية
        utterance.rate = 0.9;     // سرعة الكلام

        // عند الانتهاء من الكلام
        utterance.onend = function() {
            btn.style.display = "block";
            loading.style.display = "none";
        };

        // عند حدوث خطأ
        utterance.onerror = function() {
            btn.style.display = "block";
            loading.style.display = "none";
            alert("حدث خطأ في تشغيل الصوت على متصفحك.");
        };

        // تشغيل النطق
        window.speechSynthesis.speak(utterance);
    }
</script>

</body>
</html>
