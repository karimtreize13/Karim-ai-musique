<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARIMTREIZE13 AI - Pro Voice</title>
    <style>
        :root { --primary: #00d282; --yellow: #ffc107; --dark: #1a1a1a; }
        body { background-color: #f4f7f6; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; border-radius: 20px; width: 90%; max-width: 400px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .logo { font-size: 26px; font-weight: bold; margin-bottom: 5px; }
        .logo span { color: var(--yellow); }
        .tagline { color: #888; font-size: 12px; margin-bottom: 25px; }
        
        .box { background: #fdfdfd; border: 1px solid #eee; border-radius: 12px; padding: 15px; margin-bottom: 15px; text-align: right; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #555; }
        textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; outline: none; resize: none; text-align: center; }
        
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .btn:hover { background: #00b972; }

        /* شريط التحميل (النقاط الخمس المتحركة) */
        .loading-area { display: none; margin: 20px 0; }
        .dots { display: flex; justify-content: center; gap: 5px; margin-bottom: 10px; }
        .dot { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; animation: pulse 1.5s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }

        /* منطقة النتيجة */
        #result { display: none; margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
        audio { width: 100%; margin-bottom: 15px; }
        .download-link { display: block; background: var(--dark); color: white; padding: 12px; text-decoration: none; border-radius: 10px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">KARIM<span>TREIZE13</span> AI</div>
    <div class="tagline">تحويل النص إلى صوت آدم الاحترافي 🎙️</div>

    <div class="box">
        <label>اكتب النص المراد تحويله:</label>
        <textarea id="textInput" rows="4" placeholder="مثال: مرحباً بكم في موقع كريم..."></textarea>
    </div>

    <button id="genBtn" class="btn" onclick="generateProVoice()">توليد وتحميل الصوت ✨</button>

    <div id="loading" class="loading-area">
        <div class="dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div style="font-size: 12px; color: #777;">جاري التوليد بصوت آدم الاحترافي...</div>
    </div>

    <div id="result">
        <audio id="player" controls></audio>
        <a id="downloadBtn" class="download-link">تحميل الملف الصوتي (MP3) 📥</a>
    </div>
</div>

<script>
    async function generateProVoice() {
        const text = document.getElementById('textInput').value;
        const btn = document.getElementById('genBtn');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const player = document.getElementById('player');
        const downloadBtn = document.getElementById('downloadBtn');

        // ضع مفتاح الـ API الجديد الخاص بك هنا (مهم جداً)
        const API_KEY = "ضع_مفتاح_API_هنا"; 
        const ADAM_VOICE_ID = "pNInz6obpgDQGcFmaJgB"; // معرف صوت آدم الاحترافي

        if (!text) return alert("يرجى كتابة نص أولاً!");

        // بدء الحالة الحركية
        btn.style.display = "none";
        loading.style.display = "block";
        result.style.display = "none";

        try {
            const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${ADAM_VOICE_ID}`, {
                method: "POST",
                headers: {
                    "xi-api-key": API_KEY,
                    "Content-Type": "application/json",
                    "accept": "audio/mpeg"
                },
                body: JSON.stringify({
                    text: text,
                    model_id: "eleven_multilingual_v2",
                    voice_settings: { stability: 0.5, similarity_boost: 0.8 }
                })
            });

            if (response.ok) {
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                
                loading.style.display = "none";
                btn.style.display = "block";
                result.style.display = "block";
                
                player.src = url;
                downloadBtn.href = url;
                downloadBtn.download = "Karim13_Adam_Voice.mp3";
                player.play();
            } else {
                const err = await response.json();
                alert("خطأ: " + (err.detail.message || "تأكد من الرصيد والمفتاح"));
                loading.style.display = "none";
                btn.style.display = "block";
            }
        } catch (e) {
            alert("فشل الاتصال بالسيرفر");
            loading.style.display = "none";
            btn.style.display = "block";
        }
    }
</script>

</body>
</html>
