<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karim Tlm - محول الصوت المجاني</title>
    <style>
        body {
            background-color: #121212;
            color: #ffd700;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            width: 90%;
            max-width: 500px;
            text-align: center;
            border: 1px solid #ffd700;
        }
        h1 { font-size: 24px; margin-bottom: 20px; }
        textarea {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: white;
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
        }
        select, button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            cursor: pointer;
        }
        select { background: #333; color: white; border: 1px solid #ffd700; }
        button {
            background: #ffd700;
            color: black;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: #e6c200; transform: scale(1.02); }
        .footer { margin-top: 20px; font-size: 12px; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎙️ محول النصوص إلى صوت</h1>
    <p>بواسطة: <b>Karim Tlm</b></p>
    
    <textarea id="text-to-read" placeholder="اكتب النص هنا لتحويله إلى صوت مجاناً..." rows="5"></textarea>
    
    <select id="voices-list">
        <option>جاري تحميل الأصوات المتاحة...</option>
    </select>
    
    <button onclick="speakText()">تحويل النص إلى صوت مجاناً 🚀</button>
    
    <div class="footer">هذا النظام مجاني 100% ولا يستهلك رصيد حساباتك.</div>
</div>

<script>
    const synth = window.speechSynthesis;
    const voiceSelect = document.getElementById('voices-list');
    let voices = [];

    function populateVoiceList() {
        // ننتظر قليلاً لضمان تحميل الأصوات من النظام (Google, Microsoft, Apple)
        voices = synth.getVoices();
        voiceSelect.innerHTML = '';
        
        // تصفية الأصوات للعثور على الأصوات العربية فقط
        const arabicVoices = voices.filter(voice => voice.lang.includes('ar'));

        if (arabicVoices.length === 0) {
            let option = document.createElement('option');
            option.textContent = "لم يتم العثور على صوت عربي بجهازك";
            voiceSelect.appendChild(option);
        } else {
            arabicVoices.forEach((voice) => {
                let option = document.createElement('option');
                option.textContent = voice.name + " (عربي)";
                option.value = voice.name;
                voiceSelect.appendChild(option);
            });
        }
    }

    // لضمان عمل المتصفحات المختلفة (Chrome, Safari, Mobile)
    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = populateVoiceList;
    }
    window.onload = populateVoiceList;

    function speakText() {
        if (synth.speaking) {
            console.error('SpeechSynthesisUtterance is already speaking.');
            return;
        }
        const text = document.getElementById('text-to-read').value;
        if (text !== '') {
            const utterThis = new SpeechSynthesisUtterance(text);
            
            // اختيار الصوت الذي حدده المستخدم
            const selectedVoiceName = voiceSelect.value;
            utterThis.voice = voices.find(v => v.name === selectedVoiceName);
            
            utterThis.pitch = 1;
            utterThis.rate = 0.9; // سرعة مناسبة للقصص والمحتوى
            
            synth.speak(utterThis);
        }
    }
</script>

</body>
</html>
