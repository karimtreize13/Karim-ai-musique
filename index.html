<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Voice Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gemini-blue: #1a73e8; --gemini-gradient: linear-gradient(135deg, #4285f4, #9b51e0); }
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-card { background: white; width: 95%; max-width: 500px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 25px; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #f1f1f1; padding-bottom: 15px; }
        .header h1 { color: var(--gemini-blue); font-size: 1.5rem; margin: 0; }
        textarea { width: 100%; height: 150px; border: 2px solid #e0e0e0; border-radius: 12px; padding: 15px; font-size: 1rem; resize: none; box-sizing: border-box; transition: 0.3s; }
        textarea:focus { border-color: var(--gemini-blue); outline: none; }
        .btn-convert { width: 100%; background: var(--gemini-gradient); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 15px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-convert:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-convert:disabled { background: #ccc; }
        #audioResult { margin-top: 20px; padding: 15px; background: #e8f0fe; border-radius: 12px; display: none; }
        audio { width: 100%; }
        .footer-note { font-size: 0.8rem; color: #777; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <h1><i class="fas fa-magic"></i> Gemini Voice Studio</h1>
    </div>

    <textarea id="textInput" placeholder="اكتب النص الذي تريد تحويله بصوت Gemini الطبيعي..."></textarea>
    
    <button class="btn-convert" id="genBtn" onclick="generateGeminiVoice()">
        <i class="fas fa-play"></i> توليد الصوت مجاناً
    </button>

    <div id="audioResult">
        <p style="margin-top:0; font-weight:bold; color:#1a73e8;">الصوت جاهز:</p>
        <div id="audioPlayer"></div>
        <div style="margin-top:10px; font-size:0.9rem;" id="outputText"></div>
    </div>

    <div class="footer-note">يعمل بواسطة Gemini 2.5 Pro Preview TTS</div>
</div>

<script>
    async function generateGeminiVoice() {
        const text = document.getElementById('textInput').value;
        const btn = document.getElementById('genBtn');
        const apiKey = "AIzaSyDSZWsBOZQSacj2z5YxSnQ7AITxyvGPv6A"; // مفتاح Gemini الخاص بك

        if (!text) { alert("يرجى كتابate نص أولاً"); return; }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري المعالجة...';

        try {
            // ملاحظة: الربط المباشر بـ TTS API يتطلب إعدادات CORS أو استخدام Firebase Functions
            // هذا الكود يوضح الطريقة البرمجية للطلب
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `قم بتحويل هذا النص إلى ملف صوتي: ${text}` }] }]
                })
            });

            if (response.ok) {
                // هنا يتم استقبال الرابط أو البيانات الصوتية
                document.getElementById('audioResult').style.display = 'block';
                document.getElementById('outputText').innerText = "تم النسخ: " + text;
                // محاكاة المشغل (Gemini TTS يحتاج أحياناً لوسيط لإنتاج MP3 مباشر)
                document.getElementById('audioPlayer').innerHTML = `<p style='font-size:0.8rem; color:gray;'>ملاحظة: تأكد من تفعيل "Text-to-Speech" في إعدادات Google Cloud ليظهر المشغل هنا.</p>`;
            } else {
                alert("خطأ في المفتاح أو الإعدادات. تأكد من تفعيل نموذج TTS في Google Cloud.");
            }
        } catch (e) {
            alert("حدث خطأ في الاتصال");
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-play"></i> توليد الصوت مجاناً';
        }
    }
</script>

</body>
</html>
