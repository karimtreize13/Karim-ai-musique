<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARIMTREIZE13 AI</title>
    <style>
        :root { --primary: #00d282; --dark: #1a1a1a; }
        body { background-color: #f8f9fa; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; border-radius: 20px; width: 90%; max-width: 400px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; border: 1px solid #eee; }
        .logo { font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        .logo span { color: #ffc107; }
        
        .box { background: #fdfdfd; border: 1px solid #eee; border-radius: 12px; padding: 15px; margin-bottom: 15px; text-align: right; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #555; }
        select, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 15px; outline: none; }

        /* شريط التحميل والنقاط */
        .loading-area { display: none; margin: 20px 0; }
        .dots { display: flex; justify-content: center; gap: 5px; margin-bottom: 10px; }
        .dot { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; animation: pulse 1.5s infinite; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; font-size: 18px; }
        audio { width: 100%; margin-top: 15px; display: none; }
        .download-btn { display: none; margin-top: 15px; padding: 12px; background: var(--dark); color: white; text-decoration: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">KARIM<span>TREIZE13</span> AI</div>
    
    <div class="box">
        <label>اختر الصوت الاحترافي:</label>
        <select id="voiceId">
            <option value="pNInz6obpgDQGcFmaJgB">آدم (عميق - للعربية)</option>
            <option value="EXAVITQu4vr4xnSDxMaL">سارة (ناعم - إعلاني)</option>
            <option value="ErXwTSv69zW2VwXY7XvO">روجر (رسمي - أجنبي)</option>
        </select>
    </div>

    <div class="box">
        <label>اكتب النص هنا:</label>
        <textarea id="textInput" rows="3" placeholder="مثال: السلام عليكم..."></textarea>
    </div>

    <button id="genBtn" class="btn" onclick="generate()">تحويل النص إلى صوت ✨</button>

    <div id="loading" class="loading-area">
        <div class="dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div style="font-size: 13px; color: #888;">جاري معالجة الصوت...</div>
    </div>

    <audio id="player" controls></audio>
    <a id="download" class="download-btn">تحميل الملف الصوتي 📥</a>
    <div id="error" style="color:red; margin-top:10px; font-size:13px;"></div>
</div>

<script>
    async function generate() {
        const text = document.getElementById('textInput').value;
        const voice = document.getElementById('voiceId').value;
        const btn = document.getElementById('genBtn');
        const loading = document.getElementById('loading');
        const player = document.getElementById('player');
        const download = document.getElementById('download');
        const errorDiv = document.getElementById('error');

        // ضع هنا المفتاح الجديد من حساب لم ينتهي رصيده
        const API_KEY = "ضغ_المفتاح_الجديد_هنا"; 

        if (!text) return alert("اكتب نصاً أولاً!");

        btn.style.display = "none";
        loading.style.display = "block";
        player.style.display = "none";
        download.style.display = "none";
        errorDiv.innerHTML = "";

        try {
            const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voice}`, {
                method: "POST",
                headers: { "xi-api-key": API_KEY, "Content-Type": "application/json" },
                body: JSON.stringify({ text: text, model_id: "eleven_multilingual_v2" })
            });

            if (response.ok) {
                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                loading.style.display = "none";
                btn.style.display = "block";
                player.src = url;
                player.style.display = "block";
                download.href = url;
                download.download = "Karim13_AI.mp3";
                download.style.display = "inline-block";
            } else {
                throw new Error("انتهى الرصيد أو المفتاح خطأ");
            }
        } catch (e) {
            loading.style.display = "none";
            btn.style.display = "block";
            errorDiv.innerHTML = "❌ خطأ: تأكد من الرصيد أو صلاحية المفتاح.";
        }
    }
</script>

</body>
</html>
