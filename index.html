<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستودع الأصوات المجاني</title>
    <style>
        :root { --p-color: #2563eb; --bg-color: #f8fafc; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { text-align: center; color: #1e293b; margin-bottom: 20px; }
        textarea { width: 100%; height: 120px; padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; resize: none; box-sizing: border-box; margin-bottom: 15px; }
        select { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #e2e8f0; margin-bottom: 20px; font-size: 1rem; cursor: pointer; background-color: #fff; }
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; background: var(--p-color); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        button:hover { background: #1d4ed8; }
        .stop-btn { background: #ef4444; }
        .stop-btn:hover { background: #dc2626; }
        .info { font-size: 0.8rem; color: #64748b; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2><i class="fas fa-play-circle"></i> اختر صوتك المفضل</h2>
    
    <textarea id="textInput" placeholder="اكتب النص هنا..."></textarea>
    
    <label for="voiceSelect" style="display:block; margin-bottom:8px; font-weight:bold; color:#475569;">اختر من قائمة الأصوات المتاحة:</label>
    <select id="voiceSelect">
        <option value="">جاري تحميل الأصوات...</option>
    </select>

    <div class="btn-group">
        <button onclick="speak()">تشغيل الصوت</button>
        <button class="stop-btn" onclick="stop()">إيقاف</button>
    </div>

    <div class="info">هذه الأصوات مقدمة مجاناً من نظام التشغيل الخاص بك.</div>
</div>

<script>
    const voiceSelect = document.getElementById('voiceSelect');
    const textInput = document.getElementById('textInput');
    let synth = window.speechSynthesis;
    let voices = [];

    // دالة لجلب الأصوات وتصفية العربية منها فقط
    function loadVoices() {
        voices = synth.getVoices();
        voiceSelect.innerHTML = ''; // تفريغ القائمة

        // تصفية الأصوات التي تحتوي على لغات عربية أو أصوات جوجل/مايكروسوفت
        const arabicVoices = voices.filter(voice => voice.lang.includes('ar') || voice.name.toLowerCase().includes('arabic'));

        if (arabicVoices.length === 0) {
            const option = document.createElement('option');
            option.textContent = "لا توجد أصوات عربية مثبتة (سيتم استخدام الافتراضي)";
            voiceSelect.appendChild(option);
        } else {
            arabicVoices.forEach((voice, i) => {
                const option = document.createElement('option');
                option.textContent = `${voice.name} (${voice.lang})`;
                option.setAttribute('data-name', voice.name);
                voiceSelect.appendChild(option);
            });
        }
    }

    // انتظر تحميل الأصوات في المتصفح
    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = loadVoices;
    }

    function speak() {
        if (synth.speaking) {
            alert("هناك نص يتم قراءته بالفعل..");
            return;
        }

        if (textInput.value !== '') {
            const utterThis = new SpeechSynthesisUtterance(textInput.value);
            const selectedOption = voiceSelect.selectedOptions[0].getAttribute('data-name');
            
            // ربط النص بالصوت المختار
            voices.forEach((voice) => {
                if (voice.name === selectedOption) {
                    utterThis.voice = voice;
                }
            });

            utterThis.pitch = 1;
            utterThis.rate = 1; // السرعة
            synth.speak(utterThis);
        }
    }

    function stop() {
        synth.cancel();
    }

    // تحميل الأصوات فوراً عند فتح الصفحة
    loadVoices();
</script>

</body>
</html>
