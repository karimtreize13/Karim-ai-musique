<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karim AI Musique | SMM Paname AI</title>
    <style>
        /* الألوان مأخوذة من هويتك التجارية SMM Paname */
        :root {
            --bg-body: #f8f9f0;
            --bg-card: #ffffff;
            --primary-blue: #0d6efd;
            --accent-green: #00d282;
            --accent-orange: #ffc107;
            --text-dark: #212529;
            --border-color: #dee2e6;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-dark);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--bg-card);
            border-radius: 12px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .card-header-bar {
            background-color: var(--primary-blue);
            height: 10px;
            width: 100%;
        }

        .card-body { padding: 20px; }

        .header { text-align: center; margin-bottom: 20px; }
        .header-karim { font-weight: bold; font-size: 22px; color: var(--text-dark); }
        .header-treize { font-weight: bold; font-size: 22px; color: var(--accent-orange); }

        .input-group {
            background: #f1f3f5;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }

        label { display: block; margin-bottom: 5px; font-size: 13px; font-weight: 600; }
        input, textarea, select { width: 100%; background: transparent; border: none; outline: none; font-size: 14px; }

        .generate-btn {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            background-color: var(--accent-green);
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        #status { margin-top: 15px; text-align: center; font-size: 13px; }
        audio { width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card-header-bar"></div>
    <div class="card-body">
        <div class="header">
            <span class="header-karim">KARIM</span><span class="header-treize">TREIZE13</span> AI
            <p style="font-size: 12px; color: gray;">فرع استنساخ الأصوات الاحترافي 🎧</p>
        </div>

        <div class="input-group">
            <label>ارفع عينة الصوت (صوتك الأصلي):</label>
            <input type="file" id="audioInput" accept="audio/*">
        </div>

        <div class="input-group">
            <label>اكتب النص المراد نطقُه بصوتك:</label>
            <textarea id="textInput" rows="3" placeholder="اكتب هنا..."></textarea>
        </div>

        <button class="generate-btn" onclick="generateVoice()">توليد الصوت الآن ✨</button>

        <div id="status"></div>
    </div>
</div>

<script type="module">
    import { client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

    window.generateVoice = async function() {
        const text = document.getElementById('textInput').value;
        const audioFile = document.getElementById('audioInput').files[0];
        const status = document.getElementById('status');

        if (!text || !audioFile) {
            alert("ارفع ملف الصوت واكتب النص أولاً!");
            return;
        }

        status.innerHTML = "<span style='color: blue;'>⏳ جاري معالجة الصوت.. انتظر قليلاً</span>";

        try {
            // الاتصال بمحرك F5-TTS
            const app = await client("https://mrfakename-f5-tts.hf.space/");
            const result = await app.predict("/predict", [
                audioFile, 
                text, 
                "F5-TTS", 
                false, 
            ]);

            const audioUrl = result.data[0].url;
            status.innerHTML = `
                <p style="color: green; font-weight: bold;">✅ تم استنساخ الصوت بنجاح:</p>
                <audio controls src="${audioUrl}"></audio>
                <br><br>
                <a href="${audioUrl}" download style="color: blue;">تحميل الملف الصوتي 📥</a>
            `;
        } catch (error) {
            status.innerHTML = "<span style='color: red;'>❌ السيرفر مشغول حالياً (نفدت النقاط المجانية). حاول مرة أخرى غداً.</span>";
        }
    }
</script>

</body>
</html>
